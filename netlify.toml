[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  from = "/articles/la_fabrique_politique_de_la_peur"
  to = "/articles/La_fabrique_politique_de_la_peur.html"
  status = 200

[[redirects]]
  from = "/articles/article1"
  to = "/articles/article1.html"
  status = 200

[[redirects]]
  from = "/articles/article2"
  to = "/articles/article2.html"
  status = 200

[[redirects]]
  from = "/articles/article3"
  to = "/articles/article3.html"
  status = 200

[[redirects]]
  from = "/articles/article4"
  to = "/articles/La_fabrique_politique_de_la_peur.html"
  status = 200

[[redirects]]
  from = "/articles/La_fabrique_politique_de_la_peur_en"
  to = "/articles/La_fabrique_politique_de_la_peur_en.html"
  status = 200
